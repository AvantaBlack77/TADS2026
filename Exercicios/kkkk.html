<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="main()">iniciar</button>
    <script>
        function main() {
    var n, i, cont;

    // window.alert("informe a quantidade de numeros");
    n = Number(window.prompt('informe a quantidade de numeros'));
    var vetor = [];

    for (i = 0; i <= n - 1; i++) {
        // window.alert("informe o " + i + 1 + "ª numero");
        vetor[i] = Number(window.prompt("informe o " + (i + 1) + "ª numero"));
    }
    cont = 0;
    window.alert("NUMEROS PARES: ");
    for (i = 0; i <= n - 1; i++) {
        if (vetor[i] % 2 == 0) {
            cont = cont + 1;
        }
    }
    for (i = 0; i <= n - 1; i++) {
        if (vetor[i] % 2 == 0) {
            window.alert(vetor[i]);
        }
    }
    window.alert("quantidade de numeros pares:");
    window.alert(cont);
}

    </script>
</body>
</html>
