<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Desconto da Black Friday</title>
</head>
<body>
    <script>
        let p = Number(window.prompt("Informe o preço do produto"));
        if (isNaN(p)) {
            alert("Valor inváldo");
        } else {
            let d = (p * 0.15);
            let v = (p - d)
           window.alert(
            `Preço: R$${p.toFixed(2)}
            Desconto: R$${d.toFixed(2)}
            Final: R$${v.toFixed(2)}
        `);
        }
            
    </script>
</body>
</html>
